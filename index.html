<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🍌 Banana Generator V3</title>

<!-- Lien CSS -->
<link rel="stylesheet" href="style.css">

</head>
<body>

<h1>🍌 BANANA GENERATOR V3</h1>

<div class="container">

<!-- ============================= -->
<!-- PARAMETRES -->
<!-- ============================= -->

<label>Genre</label>
<select id="genre">
<option>Homme</option>
<option>Femme</option>
</select>

<label>Age</label>
<select id="age"></select>

<label>Mode Aléatoire IA</label>
<input type="checkbox" id="autoMode">

<hr>

<label>Haut</label>
<select id="haut"></select>

<label>Bas</label>
<select id="bas"></select>

<label>Fond</label>
<select id="fond"></select>

<label>Angle</label>
<select id="angle"></select>

<hr>

<button onclick="generate()">🚀 Générer</button>
<button class="copy" onclick="copyText()">📋 Copier</button>

<textarea id="output" rows="10"></textarea>

</div>

<!-- ============================= -->
<!-- JAVASCRIPT -->
<!-- ============================= -->

<script>

/* ========================= */
/* LISTES */
/* ========================= */

const hauts = [
"T-shirt oversize","T-shirt slim","Chemise luxe","Blazer",
"Top dentelle","Hoodie","Veste cuir","Crop top",
"Top sport","Débardeur","Chemise lin",
"Pull","Haut streetwear","Haut minimaliste"
];

const bas = [
"Jean slim","Jean regular","Cargo","Pantalon tailleur",
"Short","Jupe","Legging","Chino","Pantalon large",
"Pantalon cuir","Short en jean"
];

const fonds = [
"Rooftop skyline",
"Plage privée",
"Villa luxe",
"Hôtel 5 étoiles",
"Studio photo pro",
"Rue urbaine nuit",
"Forêt lumineuse",
"Galerie d’art",
"Piscine infinity",
"Intérieur minimaliste"
];

const angles = [
"Face",
"3/4 gauche",
"3/4 droite",
"Profil gauche",
"Profil droit",
"Contre plongée",
"Vue hauteur yeux"
];

/* ========================= */
/* FILL SELECT */
/* ========================= */

function fill(id,list){
let select = document.getElementById(id);
list.forEach(item=>{
let opt = document.createElement("option");
opt.textContent = item;
select.appendChild(opt);
});
}

/* Age */
let ageSelect = document.getElementById("age");
for(let i=18;i<=60;i++){
let opt = document.createElement("option");
opt.textContent = i;
ageSelect.appendChild(opt);
}

/* Remplissage */
fill("haut",hauts);
fill("bas",bas);
fill("fond",fonds);
fill("angle",angles);

/* ========================= */
/* GENERATE */
/* ========================= */

async function generate(){

let data = {
genre: document.getElementById("genre").value,
age: document.getElementById("age").value,
autoMode: document.getElementById("autoMode").checked,
haut: document.getElementById("haut").value,
bas: document.getElementById("bas").value,
fond: document.getElementById("fond").value,
angle: document.getElementById("angle").value
};

let res = await fetch("/generate",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});

let json = await res.json();

document.getElementById("output").value = json.prompt;

}

/* ========================= */
/* COPY */
/* ========================= */

function copyText(){
let txt = document.getElementById("output");
txt.select();
document.execCommand("copy");
alert("Copié !");
}

</script>

</body>
</html>
