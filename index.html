<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Banana AI Premium</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>

/* ============================= */
/* 🌿 BACKGROUND */
/* ============================= */

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#0f5c2e,#083d1c);
color:white;
overflow-x:hidden;
}

#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* ============================= */
/* 🌟 CONTAINER */
/* ============================= */

.container{
width:90%;
max-width:1100px;
margin:40px auto;
padding:40px;
border-radius:30px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(12px);
box-shadow:
20px 20px 60px rgba(0,0,0,0.8),
-10px -10px 25px rgba(255,255,255,0.05);
transition:0.3s;
}

/* ============================= */
/* 🔥 TITRE NEON */
/* ============================= */

h1{
text-align:center;
font-size:56px;
letter-spacing:4px;
margin-bottom:40px;
color:#ff2a2a;
animation:neonGlow 1.8s infinite alternate;
}

@keyframes neonGlow{
0%{
text-shadow:0 0 5px #ff0000,0 0 15px #ff0000;
transform:translateX(0);
}
25%{transform:translateX(-1px);}
50%{transform:translateX(1px);}
75%{transform:translateX(-1px);}
100%{
text-shadow:0 0 20px #ff1a1a,0 0 40px #ff0000;
transform:translateX(0);
}
}

/* ============================= */
/* 🎛 SELECT 3D */
/* ============================= */

select{
width:280px;
padding:16px;
margin:10px;
font-size:18px;
border-radius:18px;
border:none;
background:linear-gradient(145deg,#e6b800,#c99700);
color:black;
font-weight:bold;
box-shadow:
8px 8px 20px rgba(0,0,0,0.6),
-3px -3px 6px rgba(255,255,255,0.2);
transition:0.2s;
}

select:hover{transform:translateY(-4px);}
select:active{
box-shadow:inset 4px 4px 10px rgba(0,0,0,0.7);
transform:translateY(2px);
}

/* ============================= */
/* 🔘 BUTTONS */
/* ============================= */

button{
padding:16px 30px;
margin:15px;
font-size:18px;
border-radius:25px;
border:none;
cursor:pointer;
font-weight:bold;
transition:0.3s;
background:linear-gradient(145deg,#ff0000,#cc0000);
color:white;
box-shadow:6px 6px 20px rgba(0,0,0,0.7);
}

button:hover{transform:scale(1.08);}
button.copy{background:linear-gradient(145deg,#00cc44,#009933);}

/* ============================= */
/* 🧊 3D SCENE */
/* ============================= */

#scene3D{
width:100%;
height:450px;
margin-top:30px;
border-radius:25px;
background:black;
box-shadow:
inset 8px 8px 25px rgba(0,0,0,0.9),
inset -5px -5px 15px rgba(255,255,255,0.05);
}

/* ============================= */
/* 📝 TEXTAREA */
/* ============================= */

textarea{
width:100%;
margin-top:25px;
padding:20px;
border-radius:20px;
border:none;
font-size:15px;
background:rgba(0,0,0,0.6);
color:white;
resize:none;
box-shadow:inset 5px 5px 15px rgba(0,0,0,0.8);
}

/* ============================= */
/* 🌟 FADE IN */
/* ============================= */

.fade-in{
opacity:0;
transform:translateY(30px);
animation:fadeUp 1s forwards;
}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="container">
<h1>🔥 BANANA AI GENERATOR</h1>

<select id="genre">
<option>Man</option>
<option>Woman</option>
</select>

<select id="age"></select>
<select id="haut"></select>
<select id="bas"></select>
<select id="fond"></select>
<select id="angle"></select>

<button onclick="generate()">Generate</button>
<button class="copy" onclick="copyText()">Copy</button>

<textarea id="output" rows="8"></textarea>

<div id="scene3D"></div>
<button onclick="zoomIn()">Zoom +</button>
<button onclick="zoomOut()">Zoom -</button>
</div>

<script>

/* ============================= */
/* DATA */
/* ============================= */

let hauts=["T-shirt","Blazer","Hoodie","Top lace","Leather jacket"];
let bas=["Jean","Cargo pants","Short","Skirt"];
let fonds=["Luxury rooftop","Private beach","Modern villa","Studio photo"];
let angles=["Eye level","Low angle","3/4 left","Profile right"];

function fill(id,list){
let select=document.getElementById(id);
list.forEach(item=>{
let opt=document.createElement("option");
opt.textContent=item;
select.appendChild(opt);
});
}

fill("haut",hauts);
fill("bas",bas);
fill("fond",fonds);
fill("angle",angles);

for(let i=18;i<=60;i++){
let opt=document.createElement("option");
opt.textContent=i;
age.appendChild(opt);
}

/* ============================= */
/* PROMPT */
/* ============================= */

const LOCKED_RULES=`
MUST:
- Resolution 800x1000px
- English only
- Sunglasses from attached image MUST be on face
- Sunglasses are main focal point
- Do not remove sunglasses
- Cinematic lighting
- Professional photography
`;

function generate(){
let prompt=`
${age.value} year old ${genre.value}

Top: ${haut.value}
Bottom: ${bas.value}
Environment: ${fond.value}
Camera: ${angle.value}

${LOCKED_RULES}
`;
output.value=prompt;
}

function copyText(){
navigator.clipboard.writeText(output.value);
}

/* ============================= */
/* THREE JS */
/* ============================= */

let scene=new THREE.Scene();
let camera=new THREE.PerspectiveCamera(75,1,0.1,1000);
let renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(scene3D.clientWidth,450);
scene3D.appendChild(renderer.domElement);

let light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,5,5);
scene.add(light);

let geo=new THREE.BoxGeometry(1,2,1);
let mat=new THREE.MeshStandardMaterial({color:0x00ff88});
let avatar=new THREE.Mesh(geo,mat);
scene.add(avatar);
camera.position.z=5;

function animate(){
requestAnimationFrame(animate);
renderer.render(scene,camera);
}
animate();

function zoomIn(){camera.position.z-=0.5;}
function zoomOut(){camera.position.z+=0.5;}

/* ============================= */
/* PARTICLES */
/* ============================= */

const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<120;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*3+1,
sx:Math.random()-0.5,
sy:Math.random()-0.5
});
}

function animateParticles(){
ctx.clearRect(0,0,canvas.width,canvas.height);
particles.forEach(p=>{
p.x+=p.sx;
p.y+=p.sy;
ctx.fillStyle="rgba(255,255,0,0.7)";
ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fill();
});
requestAnimationFrame(animateParticles);
}
animateParticles();

/* ============================= */
/* DYNAMIC LIGHT */
/* ============================= */

document.addEventListener("mousemove",(e)=>{
let x=e.clientX/window.innerWidth;
let y=e.clientY/window.innerHeight;
document.querySelector(".container").style.boxShadow=
`${(x-0.5)*40}px ${(y-0.5)*40}px 60px rgba(0,0,0,0.8),
${(x-0.5)*-20}px ${(y-0.5)*-20}px 30px rgba(255,255,255,0.05)`;
});

/* ============================= */
/* FADE IN */
/* ============================= */

document.querySelectorAll("select,button,textarea")
.forEach((el,i)=>{
el.classList.add("fade-in");
el.style.animationDelay=(i*0.1)+"s";
});

</script>
</body>
</html>
