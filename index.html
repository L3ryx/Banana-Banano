<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍌 Banana Generator V3</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>

/* ========================= */
/* 🌿 GLOBAL STYLE */
/* ========================= */

body{
margin:0;
font-family:Arial, sans-serif;
background:#0b5d1e;
overflow-y:auto;
color:black;
position:relative;
}

/* BANANES FLOTTANTES */

.banana{
position:absolute;
width:60px;
animation:float 10s infinite linear;
pointer-events:none;
}

@keyframes float{
0%{transform:translateY(0) rotate(0deg);}
50%{transform:translateY(-40px) rotate(180deg);}
100%{transform:translateY(0) rotate(360deg);}
}

/* ========================= */
/* TITRE */
/* ========================= */

h1{
text-align:center;
color:white;
font-weight:bold;
font-size:48px;
text-shadow:0 0 20px lime;
}

/* ========================= */
/* CONTAINER */
/* ========================= */

.container{
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
padding:20px;
}

/* ========================= */
/* BUTTONS */
/* ========================= */

button{
font-size:22px;
padding:20px 40px;
border:none;
border-radius:20px;
cursor:pointer;
font-weight:bold;
background:yellow;
color:black;
transition:0.3s;
box-shadow:0 0 15px rgba(0,0,0,0.4);
}

button:hover{
transform:scale(1.1);
}

/* GENERATE BUTTON */

.generate{
background:red;
color:white;
}

/* COPY BUTTON */

.copy{
background:green;
color:white;
}

/* ========================= */
/* SELECTORS */
/* ========================= */

select{
font-size:20px;
padding:15px;
border-radius:15px;
background:yellow;
font-weight:bold;
}

/* ========================= */
/* INPUT */
/* ========================= */

textarea{
width:80%;
height:200px;
font-size:18px;
border-radius:15px;
padding:15px;
}

</style>

</head>
<body>

<h1>🍌 BANANA GENERATOR</h1>

<div class="container">

<!-- ===================== -->
<!-- PARAMETRES -->
<!-- ===================== -->

<label>Genre</label>
<select id="genre">
<option>Homme</option>
<option>Femme</option>
</select>

<label>Age</label>
<select id="age"></select>

<label>Haut</label>
<select id="haut"></select>

<label>Bas</label>
<select id="bas"></select>

<label>Fond</label>
<select id="fond"></select>

<label>Angle</label>
<select id="angle"></select>

<label>
<input type="checkbox" id="autoMode">
Mode Aléatoire IA
</label>

<!-- ===================== -->

<button class="generate" onclick="generate()">🚀 GENERER</button>
<button class="copy" onclick="copyText()">📋 COPIER</button>

<textarea id="output"></textarea>

</div>

<script>

/* ======================= */
/* LISTES */
/* ======================= */

let hauts=["T-shirt","Hoodie","Blazer","Top luxe","Chemise","Veste cuir"];
let bas=["Jean","Cargo","Short","Pantalon","Jupe","Legging"];
let fonds=["Studio","Plage","Rooftop","Villa","Forêt","Ville Nuit"];
let angles=["Face","3/4","Profil","Contre-plongée"];

/* FILL SELECT */

function fill(id,list){
let s=document.getElementById(id);
list.forEach(item=>{
let opt=document.createElement("option");
opt.textContent=item;
s.appendChild(opt);
});
}

fill("haut",hauts);
fill("bas",bas);
fill("fond",fonds);
fill("angle",angles);

/* AGE */

let ageSelect=document.getElementById("age");
for(let i=18;i<=60;i++){
let opt=document.createElement("option");
opt.textContent=i;
ageSelect.appendChild(opt);
}

/* ======================= */
/* GENERATION */
/* ======================= */

async function generate(){

let data={
genre:document.getElementById("genre").value,
age:document.getElementById("age").value,
haut:document.getElementById("haut").value,
bas:document.getElementById("bas").value,
fond:document.getElementById("fond").value,
angle:document.getElementById("angle").value,
autoMode:document.getElementById("autoMode").checked
};

let res=await fetch("/generate",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});

let json=await res.json();
document.getElementById("output").value=json.prompt;
}

/* COPY */

function copyText(){
let text=document.getElementById("output");
text.select();
document.execCommand("copy");
alert("Copié !");
}

/* ======================= */
/* BANANES FLOTTANTES */
/* ======================= */

function spawnBanana(){

let img=document.createElement("img");
img.src="https://cdn-icons-png.flaticon.com/512/590/590685.png";
img.className="banana";

img.style.left=Math.random()*100+"vw";
img.style.top=Math.random()*100+"vh";
img.style.animationDuration=(5+Math.random()*10)+"s";

document.body.appendChild(img);

setTimeout(()=>{
img.remove();
},10000);
}

setInterval(spawnBanana,800);

</script>

</body>
</html>
