<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Banana AI V3</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>

/* ============================= */
/* 🌿 THEME */
/* ============================= */

body{
margin:0;
font-family:Arial, sans-serif;
background:#0b3d02;
color:black;
background-image:url("https://i.postimg.cc/FHC5G1FX/nano-banana-logo.png");
background-size:cover;
background-attachment:fixed;
text-align:center;
}

h1{
color:red;
font-size:36px;
font-weight:bold;
}

/* ============================= */
/* BUTTONS */
/* ============================= */

button{
background:red;
color:white;
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
margin:5px;
font-weight:bold;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
box-shadow:0px 0px 20px red;
}

button.copy{
background:green;
}

/* ============================= */
/* SELECT */
/* ============================= */

select{
background:#d4a017;
color:black;
padding:8px;
border-radius:8px;
font-weight:bold;
}

/* ============================= */
/* LAYOUT */
/* ============================= */

.container{
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
padding:20px;
}

#scene3D{
width:80%;
height:400px;
border:2px solid white;
border-radius:15px;
background:black;
}

.face-icon{
width:40px;
vertical-align:middle;
}

</style>
</head>
<body>

<h1>🔥 BANANA PROMPT GENERATOR</h1>

<div class="container">

<!-- ========================== -->
<!-- PARAMETRES -->
<!-- ========================== -->

<div>

<label>Genre :</label>
<select id="genre">
<option>Homme</option>
<option>Femme</option>
</select>

<label>Age :</label>
<select id="age"></select>

</div>

<!-- ========================== -->
<!-- VETEMENTS -->
<!-- ========================== -->

<h2>👕 Vêtements</h2>

<select id="haut"></select>
<select id="bas"></select>

<h2>🌿 Fond</h2>
<select id="fond"></select>

<h2>🎥 Cadre</h2>

<select id="angle"></select>

<img class="face-icon"
src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

<!-- ========================== -->
<!-- ACTIONS -->
<!-- ========================== -->

<button onclick="generate()">🚀 Générer</button>
<button class="copy" onclick="copyText()">📋 Copier</button>

<textarea id="output" rows="8" style="width:80%;"></textarea>

<!-- ========================== -->
<!-- 3D -->
<!-- ========================== -->

<h2>🧊 Visualisation 3D</h2>

<div id="scene3D"></div>

<button onclick="zoomIn()">Zoom +</button>
<button onclick="zoomOut()">Zoom -</button>

</div>

<script>

/* ============================= */
/* LISTES ULTRA COMPLETE */
/* ============================= */

/* HAUT */

let hauts = [
"T-shirt","T-shirt coupe slim","T-shirt oversize",
"Chemise manches longues","Chemise manches courtes",
"Blazer","Hoodie","Top dentelle","Top bandeau",
"Top épaules dénudées","Veste cuir","Débardeur",
"Top sport","Chemise lin","Bustier","Top romantique"
];

/* BAS */

let bas = [
"Jean","Jean slim","Jean regular",
"Pantalon","Pantalon droit","Pantalon tailleur",
"Chino","Short","Short jean",
"Legging","Jupe","Mini jupe","Jupe longue"
];

/* FONDS */

let fonds = [
"Rooftop skyline",
"Hôtel 5 étoiles",
"Terrasse piscine",
"Plage privée",
"Villa moderne",
"Jardin élégant",
"Lac forêt",
"Galerie art",
"Rue urbaine nuit",
"Studio photo",
"Restaurant luxe"
];

/* ANGLES */

let angles = [
"Vue hauteur yeux",
"Contre-plongée glamour",
"Angle frontal",
"Angle 3/4 gauche",
"Angle 3/4 droit",
"Profil gauche",
"Profil droit",
"Face caméra"
];

/* ============================= */
/* INJECT OPTIONS */
/* ============================= */

function fill(id,list){
let select=document.getElementById(id);
list.forEach(item=>{
let opt=document.createElement("option");
opt.textContent=item;
select.appendChild(opt);
});
}

fill("haut",hauts);
fill("bas",bas);
fill("fond",fonds);
fill("angle",angles);

/* Age */

let ageSelect=document.getElementById("age");
for(let i=18;i<=60;i++){
let opt=document.createElement("option");
opt.textContent=i;
ageSelect.appendChild(opt);
}

/* ============================= */
/* PROMPT RULES VERROUILLEES */
/* ============================= */

const LOCKED_RULES = `
MUST:
- Always 800x1000px
- Always centered
- Sunglasses from attached image MUST be on face
- Sunglasses are main focus
- Never describe sunglasses as outfit
- Cinematic lighting
- Real skin texture
- English language only
`;

/* ============================= */
/* GENERATE PROMPT */
/* ============================= */

function generate(){

let prompt = `
${ageSelect.value} year old ${genre.value}

Top: ${haut.value}
Bottom: ${bas.value}
Environment: ${fond.value}
Camera: ${angle.value}

${LOCKED_RULES}
`;

document.getElementById("output").value = prompt;
}

/* ============================= */
/* COPY */
/* ============================= */

function copyText(){
navigator.clipboard.writeText(
document.getElementById("output").value
);
alert("Copied!");
}

/* ============================= */
/* 3D SCENE */
/* ============================= */

let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75,1,0.1,1000);
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(
document.getElementById("scene3D").clientWidth,
400
);
document.getElementById("scene3D").appendChild(renderer.domElement);

let light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,5,5);
scene.add(light);

/* Avatar */

let geometry=new THREE.BoxGeometry(1,2,1);
let material=new THREE.MeshStandardMaterial({color:0x00ff88});
let avatar=new THREE.Mesh(geometry,material);
scene.add(avatar);

camera.position.z=5;

/* Rotation Animation */

let targetRotation=0;

function setAngleRotation(val){
if(val.includes("Face")) targetRotation=0;
if(val.includes("Profil")) targetRotation=Math.PI/2;
if(val.includes("3/4")) targetRotation=Math.PI/4;
if(val.includes("Dos")) targetRotation=Math.PI;
}

document.getElementById("angle")
.addEventListener("change",function(){
setAngleRotation(this.value);
});

/* Smooth Animation */

function animate(){
requestAnimationFrame(animate);
avatar.rotation.y += (targetRotation-avatar.rotation.y)*0.1;
renderer.render(scene,camera);
}

animate();

/* Zoom */

function zoomIn(){
camera.position.z-=0.5;
}

function zoomOut(){
camera.position.z+=0.5;
}

/* Mouse Rotation */

let dragging=false;

renderer.domElement.onmousedown=()=>dragging=true;
renderer.domElement.onmouseup=()=>dragging=false;

renderer.domElement.onmousemove=(e)=>{
if(dragging){
avatar.rotation.y+=e.movementX*0.01;
}
};

</script>

</body>
</html>
