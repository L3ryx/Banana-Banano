<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Banana v2</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>

/* ============================= */
/* 🌿 THEME GLOBAL */
/* ============================= */

body{
margin:0;
font-family: Arial, sans-serif;
background: #0b3d02;
color:black;
background-image:url("https://i.postimg.cc/FHC5G1FX/nano-banana-logo.png");
background-size:cover;
background-attachment:fixed;
text-align:center;
}

/* TITRE */

h1{
color:red;
font-size:32px;
text-align:center;
}

/* ============================= */
/* BUTTONS */
/* ============================= */

button{
background:red;
color:white;
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
margin:5px;
font-weight:bold;
}

button.copy{
background:green;
}

button:hover{
opacity:0.8;
}

/* DROPDOWN */

select{
background:#d4a017;
color:black;
padding:8px;
border-radius:8px;
font-weight:bold;
}

/* ============================= */
/* CONTAINER */
/* ============================= */

.container{
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
padding:20px;
}

/* 3D */

#scene3D{
width:80%;
height:400px;
border:2px solid white;
border-radius:15px;
background:black;
}

</style>

</head>
<body>

<h1>🔥 Nano Banana Prompt Generator</h1>

<div class="container">

<!-- ============================= -->
<!-- PARAMETRES -->
<!-- ============================= -->

<div>
<label>Genre :</label>
<select id="genre">
<option>Homme</option>
<option>Femme</option>
</select>

<label>Age :</label>
<select id="age">
<script>
for(let i=18;i<=60;i++){
document.write(`<option>${i}</option>`);
}
</script>
</select>
</div>

<!-- VETEMENTS -->

<h2>👕 Vêtements</h2>

<select id="haut"></select>
<select id="bas"></select>

<button onclick="toggleRobe()">Robe / Jupe</button>

<h2>🌿 Fond</h2>
<select id="fond"></select>

<h2>🎥 Angle</h2>
<select id="angle" onchange="setAngle(this.value)">
<option value="face">Face</option>
<option value="profile">Profil</option>
<option value="threeQuarter">3/4</option>
<option value="back">Dos</option>
</select>

<!-- ============================= -->
<!-- GENERATION -->
<!-- ============================= -->

<button onclick="generate()" class="generate">
🚀 Générer
</button>

<button onclick="copyText()" class="copy">
📋 Copier
</button>

<textarea id="output" rows="8" style="width:80%;"></textarea>

<!-- ============================= -->
<!-- 3D SCENE -->
<!-- ============================= -->

<h2>🧊 Visualisation 3D</h2>

<div id="scene3D"></div>

<button onclick="zoomIn()">Zoom +</button>
<button onclick="zoomOut()">Zoom -</button>

<input type="range" min="2" max="15" step="0.1" value="5"
oninput="setZoom(this.value)">

</div>

<!-- ============================= -->
<!-- SCRIPT 3D + LOGIQUE -->
<!-- ============================= -->

<script>

/* ============================= */
/* LISTES */
/* ============================= */

let hauts = [
"T-shirt","Chemise","Blazer","Top dentelle","Veste cuir","Débardeur","Hoodie"
];

let bas = [
"Jean","Pantalon","Short","Jupe","Legging","Chino"
];

let fonds = [
"Rooftop skyline",
"Hôtel luxe",
"Plage privée",
"Villa piscine",
"Rue urbaine nuit"
];

/* Inject options */

function fillSelect(id,list){
let select = document.getElementById(id);
list.forEach(item=>{
let opt = document.createElement("option");
opt.textContent = item;
select.appendChild(opt);
});
}

fillSelect("haut",hauts);
fillSelect("bas",bas);
fillSelect("fond",fonds);

/* ============================= */
/* GENERATION PROMPT */
/* ============================= */

function generate(){

let genre = document.getElementById("genre").value;
let age = document.getElementById("age").value;
let haut = document.getElementById("haut").value;
let bas = document.getElementById("bas").value;
let fond = document.getElementById("fond").value;
let angle = document.getElementById("angle").value;

let prompt = `
${age} year old ${genre}.

Outfit:
Top: ${haut}
Bottom: ${bas}

Environment: ${fond}

Camera Angle: ${angle}

Rules:
- Perfectly centered
- 800x1000px
- 50mm lens
- Cinematic lighting
- Real skin texture
- Sunglasses from attached image
- Sunglasses are main focal point
- Never describe sunglasses as outfit
- Professional photo
- Background blur
- High realism
`;

document.getElementById("output").value = prompt;
}

/* ============================= */
/* COPY */
/* ============================= */

function copyText(){
let text = document.getElementById("output");
text.select();
document.execCommand("copy");
}

/* ============================= */
/* ROBE BUTTON */
/* ============================= */

function toggleRobe(){
alert("Mode robe / jupe activé (adapter prompt si femme)");
}

/* ============================= */
/* THREE JS 3D */
/* ============================= */

let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75,1,0.1,1000);
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(document.getElementById("scene3D").clientWidth,400);
document.getElementById("scene3D").appendChild(renderer.domElement);

let light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,5,5);
scene.add(light);

let geometry = new THREE.BoxGeometry(1,2,1);
let material = new THREE.MeshStandardMaterial({color:0x00ff88});
let avatar = new THREE.Mesh(geometry,material);
scene.add(avatar);

camera.position.z = 5;

/* ============================= */
/* ROTATION */
/* ============================= */

let isDragging=false;
renderer.domElement.addEventListener("mousedown",()=>isDragging=true);
renderer.domElement.addEventListener("mouseup",()=>isDragging=false);
renderer.domElement.addEventListener("mousemove",(e)=>{
if(isDragging){
avatar.rotation.y += e.movementX * 0.01;
}
});

/* ============================= */
/* ANGLE SELECT */
/* ============================= */

function setAngle(val){
if(val==="face") avatar.rotation.y=0;
if(val==="profile") avatar.rotation.y=Math.PI/2;
if(val==="threeQuarter") avatar.rotation.y=Math.PI/4;
if(val==="back") avatar.rotation.y=Math.PI;
}

/* ============================= */
/* ZOOM */
/* ============================= */

let minZoom=2;
let maxZoom=15;

function zoomIn(){
camera.position.z -=0.5;
if(camera.position.z<minZoom) camera.position.z=minZoom;
}

function zoomOut(){
camera.position.z +=0.5;
if(camera.position.z>maxZoom) camera.position.z=maxZoom;
}

function setZoom(val){
camera.position.z = parseFloat(val);
}

renderer.domElement.addEventListener("wheel",(e)=>{
camera.position.z += e.deltaY*0.01;
});

/* ANIMATION */

function animate(){
requestAnimationFrame(animate);
renderer.render(scene,camera);
}
animate();

</script>

</body>
</html>
