<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Banana AI Hologram</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>

/* =============================
   🌿 BACKGROUND
============================= */

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:radial-gradient(circle at center,#063d20,#021c0f);
overflow:hidden;
color:white;
}

/* =============================
   🍌 FLOATING BANANAS
============================= */

.banana{
position:fixed;
width:70px;
opacity:0.1;
pointer-events:none;
z-index:-1;
}

/* =============================
   💎 CONTAINER
============================= */

.container{
width:85%;
max-width:1200px;
margin:60px auto;
padding:60px;
border-radius:40px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
box-shadow:25px 25px 80px rgba(0,0,0,0.9);
}

/* =============================
   🏷 HOLOGRAM TITLE
============================= */

.title-wrapper{
position:relative;
text-align:center;
margin-bottom:60px;
}

h1{
font-size:72px;
letter-spacing:6px;
color:#00ff99;
text-shadow:0 0 15px #00ff99,0 0 30px #00ff99;
}

/* hologram ring */
.hologram-ring{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
width:500px;
height:150px;
border-radius:50%;
border:2px solid #00ff99;
box-shadow:0 0 20px #00ff99, inset 0 0 20px #00ff99;
animation:rotateRing 6s linear infinite;
}

@keyframes rotateRing{
from{transform:translate(-50%,-50%) rotateX(60deg) rotateZ(0deg);}
to{transform:translate(-50%,-50%) rotateX(60deg) rotateZ(360deg);}
}

/* scan line */
.scan{
position:absolute;
width:100%;
height:3px;
background:#00ff99;
top:0;
left:0;
animation:scanAnim 3s infinite;
box-shadow:0 0 20px #00ff99;
}

@keyframes scanAnim{
0%{top:0;}
100%{top:100%;}
}

/* =============================
   🎛 XXL SELECT
============================= */

select{
width:100%;
max-width:600px;
padding:25px;
margin:25px auto;
display:block;
font-size:22px;
border-radius:30px;
border:none;
background:linear-gradient(145deg,#00ff99,#00cc77);
color:black;
font-weight:bold;
box-shadow:12px 12px 30px rgba(0,0,0,0.8);
}

/* =============================
   🔘 BUTTONS
============================= */

button{
display:block;
margin:40px auto;
padding:22px 50px;
font-size:22px;
border-radius:40px;
border:none;
cursor:pointer;
font-weight:bold;
background:linear-gradient(145deg,#00ff99,#008f66);
color:black;
box-shadow:12px 12px 35px rgba(0,0,0,0.9);
transition:0.3s;
}

button:hover{transform:scale(1.08);}

button.copy{
background:linear-gradient(145deg,#ffd84d,#e6b800);
}

/* =============================
   📝 TEXTAREA
============================= */

textarea{
width:100%;
margin-top:40px;
padding:30px;
border-radius:30px;
border:none;
font-size:18px;
background:rgba(0,0,0,0.6);
color:white;
resize:none;
}

</style>
</head>
<body>

<div class="container">

<div class="title-wrapper">
<div class="hologram-ring"></div>
<h1>🍌 BANANA AI 🍌</h1>
<div class="scan"></div>
</div>

<select id="genre"></select>
<select id="age"></select>
<select id="style"></select>
<select id="mood"></select>
<select id="environment"></select>
<select id="lighting"></select>
<select id="camera"></select>
<select id="quality"></select>

<button onclick="generate()">Generate</button>
<button onclick="autoAI()">🧠 AI Auto Generate</button>
<button class="copy" onclick="copyText()">Copy Prompt</button>

<textarea id="output" rows="10"></textarea>

</div>

<script>

/* =============================
   🍌 BANANA FLOAT
============================= */

let bananas=[];
for(let i=0;i<15;i++){
let img=document.createElement("img");
img.src="https://cdn-icons-png.flaticon.com/512/590/590685.png";
img.className="banana";
document.body.appendChild(img);

bananas.push({
el:img,
x:Math.random()*window.innerWidth,
y:Math.random()*window.innerHeight,
vx:(Math.random()*2-1),
vy:(Math.random()*2-1)
});
}

function animateBananas(){
bananas.forEach(b=>{
b.x+=b.vx;
b.y+=b.vy;
if(b.x<0||b.x>window.innerWidth-70) b.vx*=-1;
if(b.y<0||b.y>window.innerHeight-70) b.vy*=-1;
b.el.style.left=b.x+"px";
b.el.style.top=b.y+"px";
});
requestAnimationFrame(animateBananas);
}
animateBananas();

/* =============================
   🎛 DATA
============================= */

const data={
genre:["Man","Woman"],
style:["Luxury","Streetwear","Business Elite","Fashion Editorial"],
mood:["Confident","Powerful","Mysterious","Relaxed"],
environment:["Penthouse","Private beach","Luxury yacht","Night city"],
lighting:["Golden hour","Cinematic","Neon glow","Studio light"],
camera:["Low angle","Eye level","Portrait 85mm","Wide angle"],
quality:["Ultra realistic","8K detail","Professional photography"]
};

for(let key in data){
let select=document.getElementById(key);
data[key].forEach(val=>{
let opt=document.createElement("option");
opt.textContent=val;
select.appendChild(opt);
});
}

for(let i=18;i<=65;i++){
let opt=document.createElement("option");
opt.textContent=i;
age.appendChild(opt);
}

/* =============================
   PROMPT CORE
============================= */

const LOCKED=`
MUST:
- Resolution 800x1000px
- English only
- Sunglasses from attached image MUST stay on face
- Sunglasses are focal point
- Cinematic lighting
- Ultra realistic photography
`;

/* Manual */
function generate(){
output.value=buildPrompt();
}

/* 🧠 IA INTERNE */
function autoAI(){

genre.selectedIndex=Math.floor(Math.random()*genre.options.length);
age.selectedIndex=Math.floor(Math.random()*age.options.length);
style.selectedIndex=Math.floor(Math.random()*style.options.length);
mood.selectedIndex=Math.floor(Math.random()*mood.options.length);
environment.selectedIndex=Math.floor(Math.random()*environment.options.length);
lighting.selectedIndex=Math.floor(Math.random()*lighting.options.length);
camera.selectedIndex=Math.floor(Math.random()*camera.options.length);
quality.selectedIndex=Math.floor(Math.random()*quality.options.length);

output.value=buildPrompt();
}

function buildPrompt(){
return `
${age.value} year old ${genre.value}
Style: ${style.value}
Mood: ${mood.value}
Environment: ${environment.value}
Lighting: ${lighting.value}
Camera: ${camera.value}
Quality: ${quality.value}

${LOCKED}
`;
}

function copyText(){
navigator.clipboard.writeText(output.value);
}

</script>
</body>
</html>
