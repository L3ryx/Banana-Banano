<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Banana AI Generator</title>

<script>
/* ===============================
   🔐 TOKEN (MET LE DANS ENV SUR RENDER)
   =============================== */
const HF_TOKEN = "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";
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>

/* =============================
   🌿 BACKGROUND
============================= */

body{
margin:0;
font-family:Arial;
background:#0b3d02;
background-image:url("https://i.postimg.cc/FHC5G1FX/nano-banana-logo.png");
background-size:cover;
background-attachment:fixed;
overflow-x:hidden;
color:black;
}

/* TITLE */

h1{
text-align:center;
color:white;
font-weight:bold;
font-size:40px;
text-shadow:0 0 20px lime;
}

/* =============================
   BUTTONS
============================= */

button{
background:yellow;
color:black;
font-size:22px;
padding:15px 30px;
border:none;
border-radius:20px;
cursor:pointer;
margin:10px;
font-weight:bold;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 20px yellow;
}

button.generate{
background:red;
color:white;
}

button.copy{
background:green;
color:white;
}

/* =============================
   SELECT
============================= */

select{
background:gold;
font-size:20px;
padding:15px;
border-radius:15px;
font-weight:bold;
}

.container{
text-align:center;
padding:40px;
}

/* TEXTAREA */

textarea{
width:80%;
height:200px;
font-size:18px;
border-radius:15px;
padding:15px;
}

</style>
</head>
<body>

<h1>🍌 BANANA AI PROMPT GENERATOR</h1>

<div class="container">

<!-- ========================= -->
<!-- PARAMETRES -->
<!-- ========================= -->

Genre:
<select id="genre">
<option>Homme</option>
<option>Femme</option>
</select>

Age:
<select id="age"></select>

Haut:
<select id="haut"></select>

Bas:
<select id="bas"></select>

Fond:
<select id="fond"></select>

Angle:
<select id="angle">
<option>Face</option>
<option>Profil</option>
<option>3/4</option>
<option>Dos</option>
</select>

<br><br>

<button class="generate" onclick="generate()">🚀 GENERER</button>
<button class="copy" onclick="copyText()">📋 COPIER</button>

<br><br>

<textarea id="output"></textarea>

</div>

<script>

/* =============================
   LISTES AUGMENTÉES
============================= */

let hauts = [
"T-shirt","T-shirt Oversize","T-shirt Slim","Chemise","Blazer",
"Top Dentelle","Top Sport","Hoodie","Sweat","Crop Top",
"Débardeur","Veste Cuir","Top Luxe","Pull","Chemise Satin"
];

let bas = [
"Jean","Jean Slim","Jean Wide","Pantalon","Chino",
"Short","Short Denim","Legging","Jupe","Mini Jupe",
"Pantalon Tailleur","Cargo","Jogging","Pantalon Large"
];

let fonds = [
"Rooftop Skyline","Hôtel Luxe","Plage Privée","Villa Piscine",
"Studio Photo","Rue Urbaine","Forêt Lumineuse",
"Restaurant Luxe","Galerie Art","Intérieur Minimaliste"
];

/* AGE AUTO */

let ageSelect = document.getElementById("age");
for(let i=18;i<=60;i++){
let opt=document.createElement("option");
opt.textContent=i;
ageSelect.appendChild(opt);
}

/* FILL SELECT */

function fill(id,list){
let s=document.getElementById(id);
list.forEach(item=>{
let o=document.createElement("option");
o.textContent=item;
s.appendChild(o);
});
}

fill("haut",hauts);
fill("bas",bas);
fill("fond",fonds);

/* =============================
   IA HUGGING FACE
============================= */

async function generateWithAI(prompt){

const response = await fetch(
"https://router.huggingface.co/hf-inference/models/distilgpt2",
{
method:"POST",
headers:{
"Authorization":"Bearer "+HF_TOKEN,
"Content-Type":"application/json"
},
body:JSON.stringify({
inputs:prompt,
parameters:{
max_new_tokens:250,
temperature:0.9
}
})
}
);

const data = await response.json();

if(data.error){
return "🔥 ERROR: "+data.error;
}

return data[0].generated_text;
}

/* =============================
   GENERATE PROMPT
============================= */

async function generate(){

let genre=document.getElementById("genre").value;
let age=document.getElementById("age").value;
let haut=document.getElementById("haut").value;
let bas=document.getElementById("bas").value;
let fond=document.getElementById("fond").value;
let angle=document.getElementById("angle").value;

let basePrompt=`
Create a professional fashion prompt.

${age} years old ${genre}

Top: ${haut}
Bottom: ${bas}
Environment: ${fond}
Angle: ${angle}

Rules:
- 800x1000px
- Centered composition
- Cinematic lighting
- Real skin texture
- Sunglasses from attached image
- Sunglasses must be main focus
- Never describe sunglasses as outfit
- Professional photo
`;

let result=await generateWithAI(basePrompt);

document.getElementById("output").value=result;
}

/* =============================
   COPY
============================= */

function copyText(){
let text=document.getElementById("output");
text.select();
document.execCommand("copy");
alert("Copied ✅");
}

</script>

</body>
</html>
