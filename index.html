<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Banana AI Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>

/* ===================================================== */
/* 🌿 THEME GLOBAL */
/* ===================================================== */

body{
margin:0;
font-family:Arial, sans-serif;
background:#0b3d02;
color:black;
overflow-x:hidden;
overflow-y:auto;
background-image:url("https://i.postimg.cc/FHC5G1FX/nano-banana-logo.png");
background-size:cover;
background-attachment:fixed;
}

/* ===================================================== */
/* 🎯 TITRE */
/* ===================================================== */

h1{
color:white;
font-weight:bold;
font-size:40px;
text-align:center;
text-shadow:0 0 20px lime;
animation:pulseGlow 2s infinite;
}

/* ===================================================== */
/* 🔥 ANIMATIONS */
/* ===================================================== */

@keyframes pulseGlow{
0%{ text-shadow:0 0 10px lime;}
50%{ text-shadow:0 0 40px lime;}
100%{ text-shadow:0 0 10px lime;}
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}

@keyframes vibrate{
0%{transform:translateX(0);}
25%{transform:translateX(2px);}
50%{transform:translateX(-2px);}
75%{transform:translateX(2px);}
100%{transform:translateX(0);}
}

/* ===================================================== */
/* 🟡 BUTTONS */
/* ===================================================== */

button{
background:yellow;
color:black;
padding:20px;
border:none;
border-radius:15px;
cursor:pointer;
font-size:18px;
font-weight:bold;
transition:0.3s;
animation:fadeIn 0.8s ease;
}

button:hover{
background:orange;
animation:vibrate 0.2s linear;
transform:scale(1.1);
}

button.generate{
background:red;
color:white;
}

/* COPY BUTTON */

button.copy{
background:green;
color:white;
}

/* ===================================================== */
/* 🔽 SELECTORS */
/* ===================================================== */

select{
background:#ffcc00;
color:black;
padding:15px;
font-size:18px;
border-radius:15px;
border:2px solid black;
transition:0.3s;
}

select:focus{
transform:scale(1.05);
box-shadow:0 0 30px yellow;
}

/* ===================================================== */
/* 📦 CONTAINER */
/* ===================================================== */

.container{
display:flex;
flex-direction:column;
align-items:center;
gap:30px;
padding:30px;
animation:fadeIn 1s ease;
}

/* ===================================================== */
/* 🌟 BANANES FLOTTANTES */
/* ===================================================== */

.banana{
position:fixed;
font-size:40px;
animation:float 10s linear infinite;
pointer-events:none;
}

@keyframes float{
0%{transform:translateY(0) translateX(0);}
50%{transform:translateY(-300px) translateX(100px);}
100%{transform:translateY(0) translateX(0);}
}

/* ===================================================== */
/* TEXTAREA */
/* ===================================================== */

textarea{
width:80%;
height:200px;
background:black;
color:lime;
border-radius:15px;
padding:15px;
font-size:16px;
border:2px solid lime;
}

</style>
</head>

<body>

<h1>🍌 BANANA AI GENERATOR 🍌</h1>

<div class="container">

<label>Genre</label>
<select id="genre">
<option>Homme</option>
<option>Femme</option>
</select>

<label>Age</label>
<select id="age"></select>

<label>Haut</label>
<select id="haut"></select>

<label>Bas</label>
<select id="bas"></select>

<label>Fond</label>
<select id="fond"></select>

<label>Angle</label>
<select id="angle"></select>

<button class="generate" onclick="generate()">🚀 GENERER</button>
<button class="copy" onclick="copyText()">📋 COPIER</button>

<textarea id="output"></textarea>

</div>

<script>

/* ===================================================== */
/* LISTES AUGMENTEES */
/* ===================================================== */

let hauts = [
"T-shirt","Chemise","Blazer","Top Dentelle","Top Sport","Top Luxe",
"Hoodie","Pull","Veste Cuir","Débardeur","Crop Top","Bustier"
];

let bas = [
"Jean","Pantalon","Short","Legging","Chino","Jupe","Mini Jupe",
"Pantalon Slim","Cargo","Tailleur","Short Denim"
];

let fonds = [
"Rooftop Skyline","Hôtel Luxe","Plage Privée","Villa Piscine",
"Studio Photo","Rue Nuit","Forêt Lumineuse","Galerie Art",
"Restaurant Chic","Appartement Moderne","Casino Luxe"
];

let angles = [
"Face","Profil","3/4 Gauche","3/4 Droite",
"Légère Contre-Plongée","Vue Hauteur Yeux"
];

/* ===================================================== */
/* FILL SELECT */
/* ===================================================== */

function fill(id,list){
let s=document.getElementById(id);
list.forEach(item=>{
let o=document.createElement("option");
o.textContent=item;
s.appendChild(o);
});
}

for(let i=18;i<=60;i++){
let opt=document.createElement("option");
opt.textContent=i;
document.getElementById("age").appendChild(opt);
}

fill("haut",hauts);
fill("bas",bas);
fill("fond",fonds);
fill("angle",angles);

/* ===================================================== */
/* GENERATE PROMPT (LOCKED RULES) */
/* ===================================================== */

function generate(){

let genre=document.getElementById("genre").value;
let age=document.getElementById("age").value;
let haut=document.getElementById("haut").value;
let bas=document.getElementById("bas").value;
let fond=document.getElementById("fond").value;
let angle=document.getElementById("angle").value;

let prompt=`
${age} year old ${genre}

Outfit:
Top: ${haut}
Bottom: ${bas}

Environment: ${fond}
Camera Angle: ${angle}

LOCKED RULES:
- Always centered
- Resolution 800x1000px
- 50mm lens
- Cinematic lighting
- Real skin texture
- Background blur
- Sunglasses from attached image
- Sunglasses are main focal point
- Never describe sunglasses as outfit
- Professional photo
- English only
- Ultra realistic
`;

document.getElementById("output").value=prompt;
}

/* COPY */

function copyText(){
navigator.clipboard.writeText(document.getElementById("output").value);
alert("Copied ✅");
}

/* ===================================================== */
/* BANANES FLOTTANTES */
/* ===================================================== */

function createBanana(){
let b=document.createElement("div");
b.innerHTML="🍌";
b.className="banana";
b.style.left=Math.random()*100+"vw";
b.style.top=Math.random()*100+"vh";
b.style.animationDuration=(5+Math.random()*10)+"s";
document.body.appendChild(b);
}

for(let i=0;i<25;i++){
createBanana();
}

setInterval(()=>{
createBanana();
},4000);

</script>

</body>
</html>
