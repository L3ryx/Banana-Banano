<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Banana AI Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>

/* ============================= */
/* 🌿 GLOBAL THEME */
/* ============================= */

html, body{
margin:0;
padding:0;
height:auto;
overflow-y:auto;
scroll-behavior:smooth;
font-family:Arial, sans-serif;
background:#0b5d1e;
color:black;
}

/* ============================= */
/* 🌟 TITRE */
/* ============================= */

h1{
text-align:center;
font-size:45px;
color:#ff0000;
text-shadow:0 0 20px #ff0000, 0 0 40px #ff3333;
font-weight:bold;
border:3px solid rgba(255,0,0,0.4);
padding:15px;
border-radius:20px;
backdrop-filter:blur(10px);
}

/* ============================= */
/* 🌻 BANANES FLOTTANTES */
/* ============================= */

.banana{
position:fixed;
font-size:40px;
animation:float 15s linear infinite;
opacity:0.8;
pointer-events:none;
}

@keyframes float{
0%{transform:translateY(100vh) rotate(0deg);}
100%{transform:translateY(-100vh) rotate(360deg);}
}

/* ============================= */
/* BUTTONS */
/* ============================= */

button{
background:yellow;
color:black;
font-weight:bold;
padding:12px 18px;
border:none;
border-radius:12px;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 10px yellow;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 25px yellow;
}

button.generate{
background:red;
color:white;
box-shadow:0 0 15px red;
}

/* ============================= */
/* SELECTORS */
/* ============================= */

select{
background:#ffd000;
color:black;
padding:12px;
border-radius:15px;
font-weight:bold;
font-size:16px;
box-shadow:0 0 15px rgba(255,255,0,0.6);
}

/* ============================= */
/* CONTAINER */
/* ============================= */

.container{
display:flex;
flex-direction:column;
align-items:center;
gap:25px;
padding:30px;
}

/* ============================= */
/* 3D FRAME */
/* ============================= */

#scene3D{
width:90%;
height:400px;
border:5px solid yellow;
border-radius:25px;
background:black;
box-shadow:0 0 40px yellow;
}

/* ============================= */
/* TEXTAREA */
/* ============================= */

textarea{
width:90%;
height:200px;
background:#0f3d12;
color:white;
border-radius:15px;
padding:15px;
border:2px solid yellow;
}

</style>
</head>
<body>

<h1>🍌 BANANA AI GENERATOR 🍌</h1>

<div class="container">

<!-- ================= PARAMETRES ================= -->

<div>
Genre :
<select id="genre">
<option>Homme</option>
<option>Femme</option>
</select>

Age :
<select id="age"></select>
</div>

<h2>👕 Vêtements</h2>

<select id="haut"></select>
<select id="bas"></select>

<h2>🌿 Fond</h2>
<select id="fond"></select>

<h2>🎥 Angle</h2>
<select id="angle"></select>

<button class="generate" onclick="generate()">🚀 Générer</button>
<button onclick="copyText()">📋 Copier</button>

<textarea id="output"></textarea>

<h2>🧊 Vue 3D</h2>

<div id="scene3D"></div>

<button onclick="zoomIn()">Zoom +</button>
<button onclick="zoomOut()">Zoom -</button>

</div>

<!-- ================= SCRIPT ================= -->

<script>

/* ================= AGE ================= */

let ageSelect=document.getElementById("age");
for(let i=18;i<=60;i++){
let opt=document.createElement("option");
opt.textContent=i;
ageSelect.appendChild(opt);
}

/* ================= LISTES PLUS GRANDES ================= */

let hauts=[
"T-shirt","Chemise","Blazer","Hoodie","Top Dentelle","Top Sport",
"Veste Cuir","Débardeur","Top Chic","Pull Oversize","Sweat"
];

let bas=[
"Jean","Jean Slim","Pantalon","Chino","Short","Jupe","Legging",
"Pantalon Tailleur","Cargo","Mini Jupe","Short Denim"
];

let fonds=[
"Rooftop","Plage","Villa Piscine","Studio Photo","Rue Nuit",
"Hotel Luxe","Forêt","Galerie Art","Intérieur Minimaliste"
];

let angles=[
"Face","Profil","3/4 Gauche","3/4 Droite",
"Légère Contre Plongée","Vue Hauteur Yeux"
];

function fill(id,list){
let select=document.getElementById(id);
list.forEach(item=>{
let opt=document.createElement("option");
opt.textContent=item;
select.appendChild(opt);
});
}

fill("haut",hauts);
fill("bas",bas);
fill("fond",fonds);
fill("angle",angles);

/* ================= GENERATE PROMPT ================= */

function generate(){

let text=
`Prompt Optimized:

Resolution: 800x1000px
English only

Gender: ${genre.value}
Age: ${age.value}
Top: ${haut.value}
Bottom: ${bas.value}
Environment: ${fond.value}
Camera: ${angle.value}

Rules:
- Perfectly centered
- Cinematic lighting
- Real skin texture
- 50mm lens
- Depth of field
- Sunglasses from attached image
- Sunglasses are main focus
- Never describe sunglasses as outfit
- Professional photo
`;

document.getElementById("output").value=text;
}

/* ================= COPY ================= */

function copyText(){
navigator.clipboard.writeText(output.value);
alert("Copié !");
}

/* ================= BANANES FLOTTANTES ================= */

for(let i=0;i<25;i++){
let banana=document.createElement("div");
banana.className="banana";
banana.innerHTML="🍌";
banana.style.left=Math.random()*100+"vw";
banana.style.animationDuration=(10+Math.random()*20)+"s";
document.body.appendChild(banana);
}

/* ================= 3D ================= */

let scene=new THREE.Scene();
let camera=new THREE.PerspectiveCamera(75,1,0.1,1000);
let renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(800,400);
document.getElementById("scene3D").appendChild(renderer.domElement);

let light=new THREE.PointLight(0xffffff,2);
light.position.set(5,5,5);
scene.add(light);

let geometry=new THREE.SphereGeometry(1.5,32,32);
let material=new THREE.MeshStandardMaterial({color:0xffff00});
let banana3D=new THREE.Mesh(geometry,material);
scene.add(banana3D);

camera.position.z=5;

/* Rotation */

let drag=false;
renderer.domElement.onmousedown=()=>drag=true;
renderer.domElement.onmouseup=()=>drag=false;
renderer.domElement.onmousemove=(e)=>{
if(drag){
banana3D.rotation.y+=e.movementX*0.01;
banana3D.rotation.x+=e.movementY*0.01;
}
};

/* Zoom */

function zoomIn(){camera.position.z-=0.5;}
function zoomOut(){camera.position.z+=0.5;}

/* Animation */

function animate(){
requestAnimationFrame(animate);
banana3D.rotation.y+=0.01;
renderer.render(scene,camera);
}
animate();

</script>

</body>
</html>
