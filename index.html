<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nano Banana Prompt Generator</title>

<style>
body{
margin:0;
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#0b3d02,#1e7a1e);
color:black;
overflow-x:hidden;
}

/* Bananas décoratives */
.banana{
position:absolute;
font-size:30px;
opacity:0.3;
}

.container{
padding:30px;
position:relative;
}

.title{
text-align:center;
font-size:40px;
color:white;
-webkit-text-stroke:1px black;
font-weight:bold;
}

/* Boutons */
button{
background:#8b0000;
color:black;
font-size:18px;
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

button:hover{
opacity:0.8;
}

/* Select */
select{
background:#d4a017;
font-size:18px;
padding:8px;
border-radius:6px;
border:none;
font-weight:bold;
}

/* Sections */
.section{
background:rgba(255,255,255,0.8);
padding:15px;
margin:10px 0;
border-radius:10px;
}

.hidden{
display:none;
}

#output{
background:white;
padding:15px;
border-radius:10px;
min-height:80px;
white-space:pre-wrap;
}

.copy-btn{
background:red;
color:white;
margin-top:10px;
}
</style>
</head>
<body>

<h1 class="title">🌿 Nano Banana Prompt Generator 🍌</h1>

<div class="container">

<!-- Sélecteur Genre -->
<div style="position:absolute;top:20px;right:20px;">
<select id="gender">
<option value="homme">👨 Homme</option>
<option value="femme">👩 Femme</option>
</select>
</div>

<!-- Age -->
<div>
<label><strong>Age</strong></label><br>
<select id="age">
<script>
for(let i=18;i<=60;i++){
document.write(`<option value="${i}">${i}</option>`);
}
</script>
</select>
</div>

<!-- Vêtements -->
<div class="section">
<h3>Vêtements</h3>

<!-- Haut -->
<button onclick="toggle('hautMenu')">Haut</button>
<div id="hautMenu" class="hidden"></div>

<br><br>

<!-- Bas -->
<button onclick="toggle('basMenu')">Bas</button>
<div id="basMenu" class="hidden"></div>

<br>

<button id="robeBtn" class="hidden" onclick="alert('Robe/Jupe options')">
Robe / Jupe
</button>

</div>

<!-- Générer -->
<button style="width:100%;" onclick="generate()">🔥 C’est parti !</button>

<h3>Prompt Généré :</h3>
<div id="output"></div>
<button class="copy-btn" onclick="copyText()">📋 Copier</button>

</div>

<script>

/* Bananas décoratives */
for(let i=0;i<25;i++){
let banana=document.createElement("div");
banana.innerHTML="🍌";
banana.className="banana";
banana.style.left=Math.random()*100+"vw";
banana.style.top=Math.random()*100+"vh";
banana.style.fontSize=Math.random()*40+10+"px";
document.body.appendChild(banana);
}

/* Toggle menu */
function toggle(id){
let el=document.getElementById(id);
el.classList.toggle("hidden");
}

/* Liste Haut */
const hauts = `
👕 Hauts Classiques
T-shirt
T-shirt oversize
T-shirt coupe normale
T-shirt coupe slim
T-shirt basique
Chemise à manches longues
Chemise à manches courtes

🔥 Hauts Streetwear
Sweat à capuche
Sweat oversize
Hoodie graphique
Sweat col rond

💎 Hauts Élégants
Blazer
Blouse satinée
Haut en soie
Chemise formelle

🌸 Hauts Femme / Mode
Crop top
Top corset
Top dentelle

🖤 Hauts Cuir / Luxe
Veste en cuir
Haut gothique

🏖 Hauts Été
Débardeur
Top plage

💪 Hauts Sport
Top de sport
`;

document.getElementById("hautMenu").innerText=hauts;

/* Liste Bas */
const bas = `
Pantalon
Jean
Short
Jupe
Legging
Jogging
Survêtement
`;

document.getElementById("basMenu").innerText=bas;

/* Affichage dynamique Femme */
document.getElementById("gender").addEventListener("change",function(){
if(this.value==="femme"){
document.getElementById("robeBtn").classList.remove("hidden");
}else{
document.getElementById("robeBtn").classList.add("hidden");
}
});

/* Génération */
function generate(){
let gender=document.getElementById("gender").value;
let age=document.getElementById("age").value;

let text=`Prompt Nano Banana\nGenre: ${gender}\nAge: ${age}\n`;

document.getElementById("output").innerText=text;
}

/* Copier */
function copyText(){
let text=document.getElementById("output").innerText;
navigator.clipboard.writeText(text);
alert("Copié !");
}

</script>

</body>
</html>
